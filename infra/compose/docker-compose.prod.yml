services:
  traefik:
    ports:
      - "${TRAEFIK_PORT:-80}:80"
    command:
      - --api.dashboard=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --ping=true
      - --metrics.prometheus=true

  api:
    restart: unless-stopped
    environment:
      APP_ENV: production

  web:
    restart: unless-stopped
    environment:
      NODE_ENV: production

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning", "--requirepass", "${REDIS_PASSWORD:-change-me}"]

  prometheus:
    restart: unless-stopped

  grafana:
    restart: unless-stopped
