name: cd

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Optional manual deploy target"
        required: false
        type: choice
        options:
          - none
          - staging
          - production
        default: none

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository_lower: ${{ steps.meta.outputs.repository_lower }}
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}

    steps:
      - name: Derive image names
        id: meta
        shell: bash
        run: |
          echo "repository_lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "deploy_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ref=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

  publish-api:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set API image name
        id: image
        run: echo "name=${{ env.REGISTRY }}/${{ needs.prepare.outputs.repository_lower }}/api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate API image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  publish-web:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set web image name
        id: image
        run: echo "name=${{ env.REGISTRY }}/${{ needs.prepare.outputs.repository_lower }}/web" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate web image metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

  deploy-staging:
    needs: [prepare, publish-api, publish-web]
    runs-on: ubuntu-latest
    environment: staging
    if: |
      (github.ref == 'refs/heads/main' || inputs.deploy_environment == 'staging') &&
      vars.CD_STAGING_ENABLED == 'true'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Check deploy prerequisites
        shell: bash
        run: |
          for value in "$DEPLOY_HOST" "$DEPLOY_USER" "$DEPLOY_PATH" "$DEPLOY_SSH_KEY"; do
            if [[ -z "$value" ]]; then
              echo "Missing staging deploy secret configuration."
              exit 1
            fi
          done

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Trigger remote staging deploy
        shell: bash
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
            export DEPLOY_ENV=staging && \
            export IMAGE_TAG='${{ needs.prepare.outputs.deploy_ref }}' && \
            ./infra/scripts/deploy.sh"

  deploy-production:
    needs: [prepare, publish-api, publish-web]
    runs-on: ubuntu-latest
    environment: production
    if: |
      (startsWith(github.ref, 'refs/tags/v') || inputs.deploy_environment == 'production') &&
      vars.CD_PRODUCTION_ENABLED == 'true'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Check deploy prerequisites
        shell: bash
        run: |
          for value in "$DEPLOY_HOST" "$DEPLOY_USER" "$DEPLOY_PATH" "$DEPLOY_SSH_KEY"; do
            if [[ -z "$value" ]]; then
              echo "Missing production deploy secret configuration."
              exit 1
            fi
          done

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Trigger remote production deploy
        shell: bash
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
            export DEPLOY_ENV=production && \
            export IMAGE_TAG='${{ needs.prepare.outputs.deploy_ref }}' && \
            ./infra/scripts/deploy.sh"
